---
driver:
  name: ec2
  region: us-east-1
  shared_credentials_profile: ec2-for-chef-dev-limitedaccess
  instance_type: t2.micro
  retryable_tries: 120
  security_group_filter:
    tag: Project
    value: ChefDevelopment
  subnet_filter:
    tag: Project
    value: ChefDevelopment
  tags:
    Name: cookbook-appserv_kanboard
    Project: Kanban
    jw:project: chef/cookbook-appserv_kanboard
    jw:stage: <%= ENV.fetch('CI_JOB_STAGE', 'lab') %>
    jw:owner: <%= ENV.fetch('USER', ENV.fetch('USERNAME', 'gitlab')) %>

## The forwarded_port port feature lets you connect to ports on the VM guest
## via localhost on the host.
## see also: https://www.vagrantup.com/docs/networking/forwarded_ports

#  network:
#    - ["forwarded_port", {guest: 80, host: 8080}]

provisioner:
  name: chef_zero

  ## product_name and product_version specifies a specific Chef product and version to install.
  ## see the Chef documentation for more details: https://docs.chef.io/workstation/config_yml_kitchen/
  #  product_name: chef
  #  product_version: 17

verifier:
  name: inspec

platforms:
  - name: ubuntu-22.04

suites:
  - name: default
    verifier:
      inspec_tests:
        - test/integration/default
