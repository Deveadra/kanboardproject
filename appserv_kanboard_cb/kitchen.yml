---
driver:
  name: ec2
  region: us-east-1
  #aws_ssh_key_id: kitchen-defaultubuntu2048-devaedra-DESKTOPCHRONOS
  shared_credentials_profile: ec2-for-chef-dev-limitedaccess
  instance_type: t2.micro
  retryable_tries: 120
  security_group_filter:
    tag: Project
    value: ChefDevelopment
  subnet_filter:
    tag: Project
    value: ChefDevelopment
  tags:
    Name: cookbook-APPSERV
    Project: ChefDevelopment
    jw:project: chef/cookbook-bethel_learn_apache2
    jw:stage: lab
    jw:owner: devaedra

transport:
  name: ssh
  username: ubuntu
  #ssh_key: /home/devaedra/src/kanboardproject/appserv_kanboard_cb/.kitchen/default-ubuntu-2204.pem
  connection_timeout: 15
  connection_retries: 5
  max_wait_until_ready: 600

provisioner:
  name: chef_infra
  chef_client_path: '/bin/chef-client'

verifier:
  name: inspec

platforms:
  - name: ubuntu-22.04
    driver:
      user_data: allow.rsa.sh

suites:
  - name: default
    run_list:
      - recipe[appserv_kanboard_cb::default]
    verifier:
      inspec_tests:
        - test/integration/default
